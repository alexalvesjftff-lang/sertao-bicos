<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertão Bicos - Identificador de Rostos</title>
    <style>
        :root { --cor-sertao: #d4a373; --cor-fundo: #fefae0; --cor-texto: #606c38; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--cor-fundo); color: var(--cor-texto); text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; border: 3px solid var(--cor-sertao); box-shadow: 10px 10px 0px var(--cor-sertao); }
        h1 { margin-bottom: 5px; color: #bc6c25; }
        p { margin-top: 0; font-style: italic; }
        .area-upload { border: 2px dashed var(--cor-sertao); padding: 20px; margin: 20px 0; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .area-upload:hover { background: #faedcd; }
        button { background-color: #283618; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background-color: #606c38; transform: scale(1.02); }
        #resultado { margin-top: 25px; font-weight: bold; padding: 15px; border-radius: 8px; display: none; }
        .admin-link { position: fixed; top: 10px; left: 10px; cursor: pointer; font-size: 20px; opacity: 0.5; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 3px solid #bc6c25; border-radius: 10px; z-index: 1000; width: 90%; max-width: 400px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        .cat-btn { background: #ccd5ae; color: #283618; width: 48%; margin: 1%; display: inline-block; }
        .cat-btn.active { background: #bc6c25; color: white; }
    </style>
</head>
<body>

    <div class="admin-link" onclick="abrirAdmin()">🌵</div>

    <div class="container">
        <h1>SERTÃO BICOS</h1>
        <p>Inteligência Artificial a serviço do Sertão</p>
        
        <div class="area-upload" onclick="document.getElementById('foto_cliente').click()">
            <span id="label_foto">Clique para subir a foto do cliente</span>
            <input type="file" id="foto_cliente" hidden onchange="mostrarNome()">
        </div>

        <button onclick="procurarBico()">🔍 PROCURAR BICO</button>

        <div id="resultado"></div>
    </div>

    <div class="overlay" id="overlay" onclick="fecharAdmin()"></div>
    <div class="modal" id="modalAdmin">
        <h3>Painel do Capitão</h3>
        <input type="password" id="senha" placeholder="Senha de Acesso" style="width: 90%; padding: 10px; margin-bottom: 10px;">
        <hr>
        <p>Escolha a Categoria do Bico:</p>
        <button class="cat-btn" onclick="selecionarCat('CARRO', event)">CARRO</button>
        <button class="cat-btn" onclick="selecionarCat('AMBOS', event)">AMBOS</button>
        <br><br>
        <input type="file" id="foto_cadastro" style="margin-bottom: 15px;">
        <button onclick="cadastrarBico()" style="background-color: #bc6c25;">✅ CADASTRAR BICO</button>
    </div>

    <script>
        // LINK DO SEU PC (ATUALIZADO)
        const URL_SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev";
        let categoriaSelecionada = "CARRO";

        function mostrarNome() {
            const input = document.getElementById('foto_cliente');
            document.getElementById('label_foto').innerText = input.files[0].name;
        }

        function abrirAdmin() {
            document.getElementById('modalAdmin').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function fecharAdmin() {
            document.getElementById('modalAdmin').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        // CORREÇÃO: Função que estava faltando
        function selecionarCat(cat, e) {
            categoriaSelecionada = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
        }

        async function procurarBico() {
            const foto = document.getElementById('foto_cliente').files[0];
            if(!foto) return alert("Selecione uma foto primeiro!");

            const resDiv = document.getElementById('resultado');
            resDiv.style.display = "block";
            resDiv.style.background = "#faedcd";
            resDiv.innerText = "⏳ Analisando traços... Aguarde.";

            const formData = new FormData();
            formData.append('foto', foto);

            try {
                const response = await fetch(`${URL_SERVIDOR}/procurar`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if(data.encontrado) {
                    resDiv.style.background = "#283618";
                    resDiv.style.color = "white";
                    resDiv.innerHTML = `✅ BICO IDENTIFICADO!<br>Nome: ${data.nome}<br>Similaridade: ${data.distancia}%`;
                } else {
                    resDiv.style.background = "#bc6c25";
                    resDiv.style.color = "white";
                    resDiv.innerText = "❌ Nenhuma correspondência encontrada no banco.";
                }
            } catch (err) {
                resDiv.innerText = "⚠️ Erro: O servidor (PC do Paulo) está Offline.";
            }
        }

        async function cadastrarBico() {
            const senha = document.getElementById('senha').value;
            const foto = document.getElementById('foto_cadastro').files[0];

            if(senha !== "9122") return alert("Senha incorreta!");
            if(!foto) return alert("Selecione a foto para salvar!");

            const formData = new FormData();
            formData.append('foto', foto);
            formData.append('categoria', categoriaSelecionada);

            try {
                const response = await fetch(`${URL_SERVIDOR}/cadastrar`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                alert(data.mensagem);
                fecharAdmin();
            } catch (err) {
                alert("Erro ao conectar com o servidor.");
            }
        }
    </script>
</body>
</html>
