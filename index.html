<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sertão - Scanner Ultra Deus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --fundo: #050505; --neon-laranja: #ff8c00; --neon-verde: #00ff00; --preto-card: #111; }
        body { background: var(--fundo); color: #fff; font-family: 'Inter', sans-serif; margin: 0; text-align: center; }
        header { background: #000; padding: 30px; border-bottom: 4px solid var(--neon-laranja); font-size: 28px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon-laranja); }
        .container { max-width: 480px; margin: auto; padding: 20px; }
        
        .up-box { background: var(--preto-card); border: 3px solid var(--neon-laranja); height: 220px; border-radius: 25px; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 25px; background-size: cover; background-position: center; box-shadow: inset 0 0 30px #000; }
        .up-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        
        .cat-grid { display: flex; gap: 15px; margin-bottom: 25px; }
        .cat-btn { background: #1a1a1a; border: 2px solid #444; padding: 18px; border-radius: 15px; color: #888; font-weight: 800; flex: 1; transition: 0.4s; }
        .cat-btn.active { border-color: var(--neon-verde); color: var(--neon-verde); box-shadow: 0 0 15px var(--neon-verde); }

        #btnScan { background: linear-gradient(90deg, #ff8c00, #ff4500); color: #fff; border: none; padding: 22px; width: 100%; border-radius: 50px; font-size: 22px; font-weight: 900; display: none; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .card { background: var(--preto-card); border-radius: 20px; padding: 18px; display: flex; align-items: center; border-left: 5px solid var(--neon-verde); margin-top: 20px; transition: 0.3s; }
        .card img { width: 120px; height: 120px; border-radius: 15px; object-fit: cover; border: 2px solid #333; }
        .info { text-align: left; margin-left: 18px; flex-grow: 1; }
        
        .barra-porcentagem { background: #222; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .barra-progresso { background: var(--neon-verde); height: 100%; box-shadow: 0 0 10px var(--neon-verde); }
        
        .btn-w { background: #25d366; color: #fff; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; margin-top: 10px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<header>🌵 ULTRA DEUS SCANNER 🌵</header>
<div class="container">
    <div class="up-box" id="previa"><span id="txt">FOTO DO CLIENTE</span><input type="file" id="fIn" accept="image/*"></div>
    <div class="cat-grid">
        <div class="cat-btn" id="b1" onclick="set('CARRO')">🚗 CARRO</div>
        <div class="cat-btn" id="b2" onclick="set('AMBOS')">🚗🏍️ AMBOS</div>
    </div>
    <button id="btnScan" onclick="iniciar()">ESCANEAR BIOMETRIA ELITE 🔍</button>
    <div id="st" style="margin-top:20px; font-size:18px;"></div>
    <div id="res"></div>
</div>

<script>
const URL = "https://undelegated-notarial-lessie.ngrok-free.dev"; 
const WHATS = "5511925243032";
let cat = '';

function set(c) {
    cat = c;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(c === 'CARRO' ? 'b1' : 'b2').classList.add('active');
    if(document.getElementById('fIn').files[0]) document.getElementById('btnScan').style.display='block';
}

document.getElementById('fIn').onchange = (e) => {
    const f = e.target.files[0];
    if(f) {
        const r = new FileReader();
        r.onload = (ev) => { document.getElementById('previa').style.backgroundImage = `url(${ev.target.result})`; document.getElementById('txt').style.display='none'; }
        r.readAsDataURL(f);
        if(cat) document.getElementById('btnScan').style.display='block';
    }
};

async function iniciar() {
    const f = document.getElementById('fIn').files[0];
    document.getElementById('st').innerHTML = "⚙️ Mapeando Mandíbula e Olhos...<br><small>Level Hard Ultra Deus Ativado</small>";
    
    const fd = new FormData();
    fd.append('foto_cliente', f);
    fd.append('categoria', cat);

    try {
        const r = await fetch(`${URL}/buscar_para_limpar`, { method: 'POST', headers: { 'ngrok-skip-browser-warning': 'true' }, body: fd });
        const d = await r.json();
        exibir(d);
    } catch(e) { document.getElementById('st').innerText = "❌ ERRO: CÉREBRO OFFLINE"; }
}

function exibir(l) {
    const div = document.getElementById('res');
    document.getElementById('st').innerHTML = l.length > 0 ? "🏆 MATCHES ENCONTRADOS" : "❌ NENHUM GÊMEO LOCALIZADO";
    div.innerHTML = l.map(m => {
        return `
        <div class="card">
            <img src="${URL}/banco_de_bicos/${m.path}?t=${Date.now()}" onerror="this.src='https://placehold.jp/24/333/fff/120x120.png?text=ERRO+FOTO'">
            <div class="info">
                <b style="color:var(--neon-verde); font-size:24px;">ID: ${m.numId}</b>
                <div style="font-size:14px; margin-top:5px;">Semelhança: <b>${m.precisao}%</b></div>
                <div class="barra-porcentagem"><div class="barra-progresso" style="width:${m.precisao}%"></div></div>
                <a href="https://wa.me/${WHATS}?text=ID:${m.numId}" target="_blank" class="btn-w">PEGAR DADOS 🌵</a>
            </div>
        </div>`;
    }).join('');
}
</script>
</body>
</html>
