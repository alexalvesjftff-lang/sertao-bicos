<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sertão Bicos - DNA Pro Cactus</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
    --fundo: #080808;
    --laranja: #ff8c00;
    --verde: #00ff00;
    --card: #111;
}

body {
    background: var(--fundo);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    text-align: center;
}

header {
    padding: 25px;
    font-size: 26px;
    font-weight: 900;
    border-bottom: 3px solid var(--verde);
}

.container {
    max-width: 450px;
    margin: auto;
    padding: 20px;
}

.upload-box {
    border: 3px dashed var(--laranja);
    height: 200px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 20px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}

.upload-box input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
}

.btn-cat {
    background: #1a1a1a;
    border: 2px solid var(--laranja);
    padding: 15px;
    color: white;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
}

.btn-cat.active {
    background: var(--laranja);
    color: black;
}

#btnBuscar {
    background: linear-gradient(45deg, #1e8449, #27ae60);
    color: white;
    border: none;
    padding: 18px;
    width: 100%;
    border-radius: 50px;
    font-weight: 900;
    font-size: 18px;
    display: none;
    cursor: pointer;
}

.loading {
    animation: piscar 1s infinite;
}

@keyframes piscar {
    50% { opacity: 0.4; }
}

#resultados {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.card {
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 15px;
}

.card img {
    width: 90px;
    height: 90px;
    border-radius: 8px;
    border: 2px solid var(--laranja);
    object-fit: cover;
}

.btn-whats {
    background: #25d366;
    color: white;
    padding: 10px;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    display: block;
    margin-top: 8px;
}
</style>
</head>

<body>

<header>🌵 SERTÃO BICOS 🌵</header>

<div class="container">

<div class="upload-box" id="box">
    <span id="txt">TOQUE PARA ENVIAR FOTO</span>
    <input type="file" id="arquivo" accept="image/*">
</div>

<div class="grid">
    <div class="btn-cat" id="c_carro">🚗 CARRO</div>
    <div class="btn-cat" id="c_ambos">🚗🏍️ AMBOS</div>
</div>

<button id="btnBuscar">PROCURAR BICO AGORA</button>

<div id="status"></div>
<div id="resultados"></div>

</div>

<script>
window.onload = () => {

    const URL_SERVIDOR = "SEU_LINK_AQUI";

    const status = document.getElementById('status');
    const resultados = document.getElementById('resultados');
    const arquivo = document.getElementById('arquivo');
    const box = document.getElementById('box');
    const txt = document.getElementById('txt');
    const btnBuscar = document.getElementById('btnBuscar');
    const c_carro = document.getElementById('c_carro');
    const c_ambos = document.getElementById('c_ambos');

    let categoria = '';

    // selecionar categoria
    function setCat(c) {
        categoria = c;

        c_carro.classList.remove('active');
        c_ambos.classList.remove('active');

        if (c === 'CARRO') c_carro.classList.add('active');
        else c_ambos.classList.add('active');

        if (arquivo.files[0]) btnBuscar.style.display = 'block';
    }

    c_carro.onclick = () => setCat('CARRO');
    c_ambos.onclick = () => setCat('AMBOS');

    // preview imagem
    arquivo.onchange = () => {
        const reader = new FileReader();

        reader.onload = (e) => {
            box.style.backgroundImage = `url(${e.target.result})`;
            txt.style.display = 'none';

            if (categoria) btnBuscar.style.display = 'block';
        };

        reader.readAsDataURL(arquivo.files[0]);
    };

    // buscar
    btnBuscar.onclick = async () => {

        if (!arquivo.files[0] || !categoria) {
            status.innerText = "⚠️ Selecione foto e categoria";
            return;
        }

        status.innerText = "⏳ ANALISANDO...";
        status.classList.add("loading");
        resultados.innerHTML = "";

        const reader = new FileReader();

        reader.onload = async () => {
            try {

                const res = await fetch(`${URL_SERVIDOR}/buscar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        image: reader.result,
                        categoria: categoria
                    })
                });

                const lista = await res.json();

                status.classList.remove("loading");

                if (!lista.length) {
                    status.innerText = "❌ NENHUM ENCONTRADO";
                    return;
                }

                status.innerText = "🔥 RESULTADOS";

                resultados.innerHTML = lista.map(b => `
                    <div class="card">
                        <img src="${b.foto}">
                        <div style="text-align:left; flex:1;">
                            <b style="color:#00ff00">
                                ${b.score}% ${b.score > 90 ? '🔥' : b.score > 80 ? '✅' : '⚠️'}
                            </b><br>
                            <small>ID: ${b.numId}</small>

                            <a href="https://wa.me/551192564332?text=Quero os dados do Bico ID:${b.numId}"
                               class="btn-whats" target="_blank">
                               PEGAR DADOS 🌵
                            </a>
                        </div>
                    </div>
                `).join('');

            } catch (e) {
                status.classList.remove("loading");
                status.innerText = "❌ ERRO DE CONEXÃO";
            }
        };

        reader.readAsDataURL(arquivo.files[0]);
    };

};
</script>

</body>
</html>
