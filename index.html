<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sertão Bicos - Biometria Facial</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --fundo: #000000;
            --laranja: #ff8c00;
            --verde: #00ff00;
            --branco: #ffffff;
            --card: #151515;
        }

        body {
            background: var(--fundo);
            color: var(--branco);
            font-family: 'Arial Black', 'Impact', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #000;
            padding: 25px 10px;
            font-size: 35px;
            border-bottom: 6px solid var(--laranja);
            text-transform: uppercase;
            color: var(--laranja);
            text-shadow: 2px 2px #000;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 20px;
        }

        /* ENQUADRAMENTO DA FOTO DO CLIENTE */
        .upload-box {
            background: var(--card);
            border: 4px dashed var(--laranja);
            height: 250px; /* Aumentado para melhor enquadramento */
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 25px;
            background-size: contain; /* Garante que a foto fique inteira e enquadrada */
            background-repeat: no-repeat;
            background-position: center;
            overflow: hidden;
        }
        
        .upload-box::before { 
            content: "🌵"; 
            font-size: 70px; 
            opacity: 0.5;
        }

        #txtUp {
            font-size: 22px; 
            font-weight: 900; 
            color: var(--branco);
            text-transform: uppercase;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 10px;
            z-index: 2;
        }

        .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        
        .cat-btn {
            background: #222;
            border: 3px solid var(--laranja);
            padding: 20px 10px;
            border-radius: 15px;
            color: var(--branco);
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        .cat-btn.active {
            background: var(--laranja);
            color: #000;
            box-shadow: 0 0 20px var(--laranja);
        }

        #btnBuscar {
            background: #27ae60;
            color: #fff;
            border: none;
            padding: 22px;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            font-size: 22px;
            display: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* CARDS DE RESULTADOS */
        .card {
            background: #111;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            border-left: 10px solid var(--verde);
            margin-bottom: 15px;
            text-align: left;
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            border: 3px solid var(--laranja);
            object-fit: cover;
        }

        .info { margin-left: 18px; flex-grow: 1; }
        
        .id-text { 
            color: var(--verde); 
            font-size: 35px; 
            font-weight: 900; 
            display: block; 
        }
        
        .perc-info { 
            font-size: 18px; 
            color: #ddd; 
            font-weight: bold;
        }

        .barra-fundo { background: #333; height: 14px; border-radius: 7px; overflow: hidden; margin: 8px 0; }
        .barra-cor { background: var(--verde); height: 100%; box-shadow: 0 0 10px var(--verde); }

        .btn-whats {
            background: #25d366;
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 900;
            display: block;
            margin-top: 10px;
            text-align: center;
            font-size: 16px;
        }

        #status { 
            margin-top: 20px; 
            font-size: 24px; 
            font-weight: 900; 
            color: var(--verde); 
            text-transform: uppercase;
            text-shadow: 1px 1px #000;
        }
    </style>
</head>
<body>

<header>🌵 SERTÃO BICOS 🌵</header>

<div class="container">
    <div class="upload-box" id="dropArea">
        <span id="txtUp">ENVIAR FOTO DO CLIENTE</span>
        <input type="file" id="fotoIn" accept="image/*">
    </div>

    <div class="cat-grid">
        <div class="cat-btn" id="b-carro" onclick="setCat('CARRO')">🚗 CARRO</div>
        <div class="cat-btn" id="b-ambos" onclick="setCat('AMBOS')">🚗🏍️ AMBOS</div>
    </div>

    <button id="btnBuscar" onclick="buscarFacial()">BUSCAR POR BIOMETRIA 🔍</button>
    
    <div id="status"></div>
    <div id="resultados"></div>
</div>

<script>
    const SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev"; 
    const WHATS = "5511925243032";
    let catSel = "";

    function setCat(c) {
        catSel = c;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(c === 'CARRO' ? 'b-carro' : 'b-ambos').classList.add('active');
        if(document.getElementById('fotoIn').files[0]) document.getElementById('btnBuscar').style.display = 'block';
    }

    document.getElementById('fotoIn').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('dropArea').style.backgroundImage = `url(${ev.target.result})`;
                document.getElementById('txtUp').style.display = 'none';
                document.getElementById('dropArea').style.setProperty('background-size', 'contain');
            };
            reader.readAsDataURL(file);
            if(catSel) document.getElementById('btnBuscar').style.display = 'block';
        }
    };

    async function buscarFacial() {
        const f = document.getElementById('fotoIn').files[0];
        const st = document.getElementById('status');
        
        // MENSAGEM QUE VOCÊ PEDIU
        st.innerHTML = "🔍 BUSCANDO BICO...";

        const fd = new FormData();
        fd.append('foto_cliente', f);
        fd.append('categoria', catSel);

        try {
            const res = await fetch(`${SERVIDOR}/buscar_para_limpar`, {
                method: 'POST',
                headers: { 'ngrok-skip-browser-warning': 'true' },
                body: fd
            });
            const dados = await res.json();
            exibirResultados(dados);
        } catch (err) {
            st.innerHTML = "❌ SERVIDOR OFFLINE";
        }
    }

    function exibirResultados(lista) {
        const div = document.getElementById('resultados');
        const st = document.getElementById('status');
        
        st.innerHTML = lista.length > 0 ? "✅ BICO ENCONTRADO!" : "❌ NÃO LOCALIZADO";
        
        div.innerHTML = lista.map(res => `
            <div class="card">
                <img src="${SERVIDOR}/banco_de_bicos/${res.path}?v=${Date.now()}" onerror="this.src='https://placehold.jp/24/333/fff/110x110.png?text=ERRO'">
                <div class="info">
                    <span class="id-text">ID: ${res.numId}</span>
                    <div class="perc-info">Semelhança: ${res.precisao}%</div>
                    <div class="barra-fundo"><div class="barra-cor" style="width: ${res.precisao}%"></div></div>
                    <a href="https://wa.me/${WHATS}?text=Olá, quero o bico do ID:${res.numId}" target="_blank" class="btn-whats">PEGAR DADOS 🌵</a>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
