<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sertão Bicos - DNA Ultra Deus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* DESIGN PERSONALIZADO SERTÃO */
        :root {
            --fundo: #050505;
            --primaria: #ff8c00; /* Laranja Sertão */
            --secundaria: #00ff00; /* Verde Neon */
            --card-bg: rgba(20, 20, 20, 0.95);
            --texto: #ffffff;
        }

        body {
            background: var(--fundo);
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%);
            color: var(--texto);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background: #000;
            padding: 30px 10px;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 4px solid var(--primaria);
            box-shadow: 0 4px 20px rgba(255, 140, 0, 0.3);
            letter-spacing: 4px;
        }

        .container {
            max-width: 480px;
            margin: auto;
            padding: 20px;
        }

        /* ÁREA DE UPLOAD ESTILIZADA */
        .upload-container {
            background: var(--card-bg);
            border: 3px dashed var(--primaria);
            height: 220px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 25px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .upload-container:active { transform: scale(0.95); }
        
        .upload-container i { font-size: 50px; margin-bottom: 10px; display: block; }
        .upload-container input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        /* BOTÕES DE CATEGORIA */
        .grid-botoes { display: flex; gap: 15px; margin-bottom: 25px; }
        .btn-cat {
            flex: 1;
            background: #111;
            border: 2px solid #333;
            padding: 18px;
            border-radius: 15px;
            color: #888;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-cat.active {
            border-color: var(--secundaria);
            color: var(--secundaria);
            background: rgba(0, 255, 0, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        /* BOTÃO SCANNER */
        #btnScan {
            background: linear-gradient(135deg, var(--primaria) 0%, #ff4500 100%);
            color: white;
            border: none;
            padding: 22px;
            width: 100%;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            display: none;
            box-shadow: 0 8px 25px rgba(255, 69, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* CARDS DE RESULTADO ELITE */
        .card-resultado {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            align-items: center;
            border-left: 6px solid var(--secundaria);
            margin-top: 20px;
            border-top: 1px solid #333;
            animation: surgir 0.5s ease-out;
        }

        @keyframes surgir { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card-resultado img {
            width: 110px;
            height: 110px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid var(--primaria);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .info-bico { text-align: left; margin-left: 20px; flex-grow: 1; }
        .id-text { color: var(--secundaria); font-size: 26px; font-weight: 900; display: block; }
        
        /* BARRA DE SEMELHANÇA */
        .label-precisao { font-size: 12px; color: #aaa; margin-top: 8px; display: block; text-transform: uppercase; }
        .barra-bg { background: #222; height: 8px; border-radius: 4px; margin: 6px 0; width: 100%; overflow: hidden; }
        .barra-fill { background: var(--secundaria); height: 100%; box-shadow: 0 0 10px var(--secundaria); }

        .btn-whats {
            background: #25d366;
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 12px;
            font-size: 14px;
            gap: 8px;
        }

        #status-ia { margin-top: 20px; font-weight: bold; color: var(--secundaria); font-style: italic; }
    </style>
</head>
<body>

<header>🌵 SERTÃO BIOMETRIA 🌵</header>

<div class="container">
    <div class="upload-container" id="dropZone">
        <span id="aviso-up" style="font-weight: 800; font-size: 14px; color: var(--primaria);">
             [ TOQUE PARA ENVIAR FOTO ]
        </span>
        <input type="file" id="inputFoto" accept="image/*">
    </div>

    <div class="grid-botoes">
        <button class="btn-cat" id="cat-carro" onclick="selecionar('CARRO')">🚗 CARRO</button>
        <button class="btn-cat" id="cat-ambos" onclick="selecionar('AMBOS')">🚗🏍️ AMBOS</button>
    </div>

    <button id="btnScan" onclick="processarScanner()">INICIAR SCANNER ULTRA DEUS 🔍</button>
    
    <div id="status-ia"></div>
    <div id="lista-resultados"></div>
</div>

<script>
    const SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev";
    const FONE = "5511925243032";
    let categoriaAtual = "";

    function selecionar(c) {
        categoriaAtual = c;
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        document.getElementById(c === 'CARRO' ? 'cat-carro' : 'cat-ambos').classList.add('active');
        if(document.getElementById('inputFoto').files[0]) document.getElementById('btnScan').style.display = 'block';
    }

    document.getElementById('inputFoto').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('dropZone').style.backgroundImage = `url(${ev.target.result})`;
                document.getElementById('aviso-up').style.display = 'none';
            };
            reader.readAsDataURL(file);
            if(categoriaAtual) document.getElementById('btnScan').style.display = 'block';
        }
    };

    async function processarScanner() {
        const f = document.getElementById('inputFoto').files[0];
        const status = document.getElementById('status-ia');
        status.innerHTML = "⚡ MAPEANDO MANDÍBULA E OLHOS...";

        const fd = new FormData();
        fd.append('foto_cliente', f);
        fd.append('categoria', categoriaAtual);

        try {
            const res = await fetch(`${SERVIDOR}/buscar_para_limpar`, {
                method: 'POST',
                headers: { 'ngrok-skip-browser-warning': 'true' },
                body: fd
            });
            const dados = await res.json();
            renderizar(dados);
        } catch (err) {
            status.innerHTML = "❌ CÉREBRO OFFLINE NO PC";
        }
    }

    function renderizar(lista) {
        const div = document.getElementById('lista-resultados');
        const status = document.getElementById('status-ia');
        
        status.innerHTML = lista.length > 0 ? "✅ MATCHES IDENTIFICADOS!" : "❌ NENHUM GÊMEO ENCONTRADO";
        
        div.innerHTML = lista.map(m => `
            <div class="card-resultado">
                <img src="${SERVIDOR}/banco_de_bicos/${m.path}?v=${Date.now()}" onerror="this.src='https://placehold.jp/24/333/fff/110x110.png?text=ERRO+FOTO'">
                <div class="info-bico">
                    <span class="id-text">ID: ${m.numId}</span>
                    <span class="label-precisao">Semelhança: ${m.precisao}%</span>
                    <div class="barra-bg"><div class="barra-fill" style="width: ${m.precisao}%"></div></div>
                    <a href="https://wa.me/${FONE}?text=Olá, quero o bico do ID:${m.numId}" target="_blank" class="btn-whats">
                        PEGAR DADOS 🌵
                    </a>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
