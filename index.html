<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sertão Bicos - DNA Pro Cactus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --cor-fundo: #080808; 
            --cor-principal: #ff8c00; 
            --cor-detalhe: #00ff00; 
            --cor-texto: #ffffff;
            --cor-card: #111111;
            --cor-whats: #25d366;
        }

        body { background: var(--cor-fundo); color: var(--cor-texto); font-family: 'Arial Black', sans-serif; margin: 0; text-align: center; }
        header { background: #000; padding: 25px; font-size: 28px; font-weight: 900; text-transform: uppercase; border-bottom: 3px solid var(--cor-detalhe); box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); }
        
        .msg-rapido { color: var(--cor-principal); font-weight: 800; font-size: 14px; margin-top: 10px; display: block; letter-spacing: 1px; text-transform: uppercase; }

        .container { max-width: 500px; margin: auto; padding: 20px; }

        .upload-box { 
            background: var(--cor-card); border: 3px dashed var(--cor-principal); height: 220px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; 
            position: relative; background-size: contain; background-repeat: no-repeat; background-position: center; 
            margin-bottom: 25px; transition: all 0.3s ease; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .upload-box::before { content: "🌵"; display: var(--display-icone, block); font-size: 45px; filter: drop-shadow(0 0 10px var(--cor-detalhe)); margin-bottom: 10px; }
        .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; }

        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .cat-btn { background: #1a1a1a; border: 2px solid var(--cor-principal); padding: 18px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .cat-btn.active { background: var(--cor-principal); border-color: #fff; color: #000; }

        button#btnBuscar { 
            background: linear-gradient(45deg, #1e8449, #27ae60); color: white; border: none; padding: 20px; 
            font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: 900; width: 100%; display: none; margin-bottom: 20px;
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,255,0,0.3);
        }

        #status { margin-top: 10px; font-size: 18px; font-weight: bold; color: var(--cor-detalhe); text-transform: uppercase; }
        #avisoMescla { display: none; background: #d35400; color: white; padding: 15px; border-radius: 10px; margin: 15px 0; font-weight: bold; font-size: 14px; border: 2px solid #fff; line-height: 1.4; text-transform: uppercase; }

        #resultados { display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }
        .card { background: var(--cor-card); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 2px solid #333; border-left: 6px solid var(--cor-detalhe); }
        .card img { width: 110px; height: 110px; border-radius: 12px; border: 2px solid var(--cor-principal); object-fit: cover; }

        .info-area { text-align: left; flex-grow: 1; }
        .match-score { color: var(--cor-detalhe); font-size: 20px; font-weight: 900; }
        .id-label { background: #222; color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 24px; font-weight: 900; display: inline-block; margin: 5px 0; border: 1px solid #444; }
        
        /* BARRA DE SEMELHANÇA */
        .barra-fundo { background: #222; height: 10px; border-radius: 5px; overflow: hidden; margin: 8px 0; border: 1px solid #333; }
        .barra-cor { background: var(--cor-detalhe); height: 100%; box-shadow: 0 0 10px var(--cor-detalhe); }

        .btn-whats { background: var(--cor-whats); color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: 900; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px; border: none; text-transform: uppercase; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; align-items: center; justify-content: center; }
        #modal img { max-width: 90%; max-height: 80%; border: 3px solid var(--cor-detalhe); }
    </style>
</head>
<body>

<header>🌵 SERTÃO BICOS 🌵</header>
<span class="msg-rapido">BICOS RAPIDOS</span>

<div class="container">
    <div class="upload-box" id="dropArea">
        <span style="font-weight:900; font-size: 18px;" id="labelUpload">ENVIAR FOTO DO CLIENTE</span>
        <input type="file" id="fotoCliente" accept="image/*">
    </div>

    <div class="category-grid">
        <div class="cat-btn" id="btnCarro" onclick="selecionarCat('CARRO')">🚗 CARRO</div>
        <div class="cat-btn" id="btnAmbos" onclick="selecionarCat('AMBOS')">🚗🏍️ AMBOS</div>
    </div>

    <button id="btnBuscar" onclick="buscarNoServidor()">🔍 BUSCANDO BICO...</button>
    <div id="status"></div>
    <div id="avisoMescla">⚠️ TESTE O BICO ANTES! VEJA SE DÁ MESCLA!</div>
    <div id="resultados"></div>
</div>

<div id="modal" onclick="this.style.display='none'"><img id="imgModal" src=""></div>

<script>
// --- CONFIGURAÇÃO ---
const URL_SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev"; // Seu Ngrok atual
const WHATSAPP_NUMERO = "5511930927753";
let categoriaSelecionada = '';

function selecionarCat(cat) {
    categoriaSelecionada = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(cat === 'CARRO' ? 'btnCarro' : 'btnAmbos').classList.add('active');
    if(document.getElementById('fotoCliente').files[0]) {
        mostrarBotao();
    }
}

function mostrarBotao() {
    const btn = document.getElementById('btnBuscar');
    btn.style.display = 'block';
    btn.innerText = "PROCURAR BICO 🔍";
}

document.getElementById('fotoCliente').onchange = (e) => {
    const file = e.target.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const dropArea = document.getElementById('dropArea');
            dropArea.style.backgroundImage = `url(${event.target.result})`;
            dropArea.style.setProperty('--display-icone', 'none'); 
            document.getElementById('labelUpload').style.display = 'none';
            dropArea.style.backgroundSize = 'contain';
        };
        reader.readAsDataURL(file);
        if(categoriaSelecionada) mostrarBotao();
    }
};

async function buscarNoServidor() {
    const file = document.getElementById('fotoCliente').files[0];
    const status = document.getElementById('status');
    const resultados = document.getElementById('resultados');
    const aviso = document.getElementById('avisoMescla');

    status.innerHTML = "🔍 <b>BUSCANDO BICO...</b>";
    resultados.innerHTML = "";
    aviso.style.display = "none";

    const formData = new FormData();
    formData.append('foto_cliente', file);
    formData.append('categoria', categoriaSelecionada);

    try {
        const res = await fetch(`${URL_SERVIDOR}/buscar_para_limpar`, {
            method: 'POST',
            headers: {'ngrok-skip-browser-warning': 'true'},
            body: formData
        });

        const dados = await res.json();
        
        if(dados.length > 0) {
            status.innerHTML = "✅ <b>MATCH ENCONTRADO!</b>";
            aviso.style.display = "block";
            
            resultados.innerHTML = dados.map(res => `
                <div class="card">
                    <img src="${URL_SERVIDOR}/banco_de_bicos/${res.path}?v=${Date.now()}" onclick="zoom(this.src)">
                    <div class="info-area">
                        <div class="match-score">${res.precisao}% MATCH</div>
                        <div class="barra-fundo"><div class="barra-cor" style="width: ${res.precisao}%"></div></div>
                        <div class="id-label">ID: ${res.numId}</div>
                        <a href="https://wa.me/${WHATSAPP_NUMERO}?text=Olá, quero o bico do ID:${res.numId}" target="_blank" class="btn-whats">
                            PEGAR DADOS 🌵
                        </a>
                    </div>
                </div>
            `).join('');
        } else {
            status.innerHTML = "❌ <b>NENHUM GÊMEO ENCONTRADO</b>";
        }
    } catch (err) {
        status.innerText = "❌ ERRO: SERVIDOR OFFLINE NO PC";
    }
}

function zoom(src) { document.getElementById('imgModal').src = src; document.getElementById('modal').style.display = 'flex'; }
</script>
</body>
</html>
