<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sertão Bicos - DNA Pro Cactus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --fundo: #080808; --laranja: #ff8c00; --verde: #00ff00; --card: #111111; }
        body { background: var(--fundo); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        header { background: #000; padding: 20px; font-size: 24px; font-weight: bold; border-bottom: 3px solid var(--verde); }
        .container { max-width: 450px; margin: auto; padding: 20px; }
        
        .upload-box { 
            background: var(--card); border: 3px dashed var(--laranja); height: 180px; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px;
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn { background: #222; border: 2px solid var(--laranja); padding: 15px; border-radius: 10px; color: #fff; font-weight: bold; }
        .cat-btn.active { background: var(--laranja); color: #000; }

        #btnBuscar { background: #27ae60; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 30px; font-weight: bold; font-size: 18px; display: none; margin-top: 10px; }
        
        #resultados { margin-top: 20px; padding-bottom: 50px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; display: flex; align-items: center; border: 1px solid #333; margin-bottom: 10px; }
        .card img { width: 100px; height: 100px; border-radius: 10px; border: 2px solid var(--laranja); object-fit: cover; }
        
        .btn-whats { background: #25d366; color: #fff; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; display: block; margin-top: 10px; text-align: center; }
        #adminPanel { display: none; position: fixed; inset: 10px; background: #fff; color: #000; padding: 20px; z-index: 999; border-radius: 15px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

<div style="width:50px;height:50px;position:fixed;top:0;left:0;" onclick="abrirAdmin()"></div>
<header>🌵 SERTÃO BICOS 🌵</header>

<div class="container">
    <div class="upload-box" id="dropArea">
        <span id="txtUp">TOQUE PARA ENVIAR FOTO</span>
        <input type="file" id="fotoIn" accept="image/*">
    </div>

    <div class="cat-grid">
        <div class="cat-btn" id="btnC" onclick="setCat('CARRO')">🚗 CARRO</div>
        <div class="cat-btn" id="btnA" onclick="setCat('AMBOS')">🚗🏍️ AMBOS</div>
    </div>

    <button id="btnBuscar" onclick="buscar()">PROCURAR MEU BICO 🌵</button>
    <div id="status" style="margin-top:15px; font-weight:bold; color:var(--verde);"></div>
    <div id="resultados"></div>
</div>

<div id="adminPanel">
    <h3>ADM SERTÃO</h3>
    <select id="admCat" style="width:100%; padding:10px;"><option value="CARRO">CARRO</option><option value="AMBOS">AMBOS</option></select>
    <input type="file" id="admFotos" multiple style="margin:20px 0;">
    <button onclick="uploadLote()" style="width:100%; padding:15px; background:green; color:white; border:none;">CADASTRAR NO PC</button>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="margin-top:10px; width:100%;">SAIR</button>
</div>

<script>
const SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev"; 
const WHATS = "5511925243032";
let catSel = '';

function setCat(c) {
    catSel = c;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(c === 'CARRO' ? 'btnC' : 'btnA').classList.add('active');
    if(document.getElementById('fotoIn').files[0]) document.getElementById('btnBuscar').style.display = 'block';
}

document.getElementById('fotoIn').onchange = (e) => {
    const file = e.target.files[0];
    if(file) {
        document.getElementById('txtUp').style.display = 'none';
        const reader = new FileReader();
        reader.onload = (ev) => document.getElementById('dropArea').style.backgroundImage = `url(${ev.target.result})`;
        reader.readAsDataURL(file);
        if(catSel) document.getElementById('btnBuscar').style.display = 'block';
    }
};

async function buscar() {
    const file = document.getElementById('fotoIn').files[0];
    const status = document.getElementById('status');
    status.innerText = "🌵 BUSCANDO NO PC...";
    
    try {
        const res = await fetch(`${SERVIDOR}/buscar_para_limpar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
            body: JSON.stringify({ cpfs: [file.name] }) 
        });
        const dados = await res.json();
        exibir(dados);
    } catch(e) { status.innerText = "❌ ERRO: PC OFFLINE"; }
}

function exibir(lista) {
    const div = document.getElementById('resultados');
    document.getElementById('status').innerText = lista.length > 0 ? "✅ BICO LOCALIZADO!" : "❌ NÃO ENCONTRADO";
    
    div.innerHTML = lista.map(res => {
        const urlFoto = `${SERVIDOR}/banco_de_bicos/${res.path}?t=${new Date().getTime()}`;
        return `
        <div class="card">
            <img src="${urlFoto}" onerror="this.src='https://placehold.jp/24/ff8c00/ffffff/100x100.png?text=FOTO+OFF';">
            <div style="text-align:left; padding-left:15px; flex-grow:1;">
                <b style="color:var(--verde); font-size:22px;">ID: ${res.numId}</b>
                <a href="https://wa.me/${WHATS}?text=ID:${res.numId}" target="_blank" class="btn-whats">PEGAR DADOS 🌵</a>
            </div>
        </div>`;
    }).join('');
}

function abrirAdmin() { if(prompt("Senha:") === "9122") document.getElementById('adminPanel').style.display = 'block'; }

async function uploadLote() {
    const files = Array.from(document.getElementById('admFotos').files);
    const cat = document.getElementById('admCat').value;
    for (let f of files) {
        const fd = new FormData();
        fd.append('foto', f); fd.append('nome_real', f.name); fd.append('categoria', cat);
        await fetch(`${SERVIDOR}/cadastrar_auto`, { method: 'POST', headers: {'ngrok-skip-browser-warning': 'true'}, body: fd });
        await new Promise(r => setTimeout(r, 600));
    }
    alert("Cadastrado no PC!");
}
</script>
</body>
</html>
