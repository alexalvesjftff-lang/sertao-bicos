<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sertão Bicos | Biometria Facial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');
        body { font-family: 'Oswald', sans-serif; background-color: #000; color: #fff; }
        .btn-sertao { background: linear-gradient(45deg, #f39c12, #d35400); transition: 0.3s; }
        .btn-sertao:active { transform: scale(0.95); }
        .card-bico { border: 1px solid #333; background: #111; border-radius: 15px; overflow: hidden; }
        #camera-preview { transform: scaleX(-1); border: 3px solid #f39c12; border-radius: 20px; }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4">

    <header class="text-center py-6">
        <h1 class="text-4xl font-bold text-orange-500 uppercase italic">🌵 Sertão Bicos</h1>
        <p class="text-gray-400 text-sm">ENCONTRE SEU BICO PELA FACE</p>
    </header>

    <div class="max-w-md mx-auto relative mb-6">
        <video id="video" width="100%" height="auto" autoplay playsinline class="bg-gray-900 shadow-2xl shadow-orange-900/20"></video>
        <canvas id="canvas" class="hidden"></canvas>
        
        <div class="absolute inset-0 border-[2px] border-dashed border-orange-500/30 rounded-2xl m-8 pointer-events-none"></div>
    </div>

    <div class="max-w-md mx-auto space-y-4">
        <button id="btn-buscar" class="btn-sertao w-full py-5 rounded-2xl text-2xl font-bold uppercase shadow-lg">
            <i class="fas fa-camera mr-2"></i> BUSCAR BICO AGORA
        </button>

        <div id="status-msg" class="text-center text-orange-400 font-bold hidden">
            <span class="loading-pulse">🔍 PROCESSANDO NA FILA... AGUARDE</span>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-10">
        <h2 class="text-xl border-b-2 border-orange-600 mb-4 pb-2">🎯 RESULTADOS ENCONTRADOS</h2>
        <div id="lista-resultados" class="grid grid-cols-1 gap-4">
            <p class="text-gray-600 text-center py-10">Nenhum bico buscado ainda.</p>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DO SERVIDOR (COLE SEU LINK DO NGROK AQUI) ---
        const URL_SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnBuscar = document.getElementById('btn-buscar');
        const statusMsg = document.getElementById('status-msg');
        const listaResultados = document.getElementById('lista-resultados');

        // Iniciar Câmera do Celular
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Erro ao abrir câmera: " + err); });

        btnBuscar.addEventListener('click', async () => {
            // 1. Interface de Carregamento
            btnBuscar.disabled = true;
            btnBuscar.classList.add('opacity-50');
            statusMsg.classList.remove('hidden');
            listaResultados.innerHTML = "";

            // 2. Captura a Foto
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('foto_cliente', blob, 'face.jpg');
                formData.append('categoria', 'GERAL');

                try {
                    // 3. Envia para o Python (Fila de Espera)
                    const response = await fetch(`${URL_SERVIDOR}/buscar_para_limpar`, {
                        method: 'POST',
                        body: formData
                    });

                    const bicos = await response.json();

                    // 4. Exibe os Resultados
                    statusMsg.classList.add('hidden');
                    btnBuscar.disabled = false;
                    btnBuscar.classList.remove('opacity-50');

                    if (bicos.length === 0) {
                        listaResultados.innerHTML = "<p class='text-center text-red-500'>Nenhum bico compatível encontrado.</p>";
                        return;
                    }

                    bicos.forEach(bico => {
                        const htmlCard = `
                            <div class="card-bico flex items-center p-3 animate__animated animate__fadeInUp">
                                <img src="${URL_SERVIDOR}/banco_de_bicos/${bico.path}" class="w-20 h-20 object-cover rounded-lg border border-orange-500">
                                <div class="ml-4">
                                    <h3 class="text-orange-500 text-lg font-bold">ID: ${bico.numId}</h3>
                                    <p class="text-sm text-gray-400">Precisão: ${bico.precisao}%</p>
                                    <div class="mt-1 w-24 h-1 bg-gray-800 rounded-full">
                                        <div class="h-full bg-green-500 rounded-full" style="width: ${bico.precisao}%"></div>
                                    </div>
                                </div>
                            </div>
                        `;
                        listaResultados.innerHTML += htmlCard;
                    });

                } catch (error) {
                    alert("Erro de Conexão: Verifique se o Ngrok está online!");
                    btnBuscar.disabled = false;
                    statusMsg.classList.add('hidden');
                }
            }, 'image/jpeg', 0.8);
        });
    </script>

</body>
</html>
