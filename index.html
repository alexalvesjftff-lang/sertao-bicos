<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sertão Bicos - DNA Pro Cactus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --fundo: #080808; --laranja: #ff8c00; --verde: #00ff00; --card: #111; }
        body { background: var(--fundo); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 25px; font-size: 26px; font-weight: 900; border-bottom: 3px solid var(--verde); box-shadow: 0 0 15px rgba(0,255,0,0.4); }
        .container { max-width: 450px; margin: auto; padding: 20px; }
        .upload-box { border: 3px dashed var(--laranja); height: 200px; border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-cat { background: #222; border: 2px solid var(--laranja); padding: 15px; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .btn-cat.active { background: var(--laranja); color: black; }
        #btnBuscar { background: #27ae60; color: white; border: none; padding: 18px; width: 100%; border-radius: 50px; font-weight: 900; display: none; cursor: pointer; }
        .card { background: var(--card); margin-top: 10px; padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid #333; }
        .card img { width: 80px; height: 80px; border-radius: 5px; border: 1px solid var(--laranja); }
        .btn-whats { background: #25d366; color: white; padding: 8px; text-decoration: none; border-radius: 5px; font-size: 13px; display: block; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>🌵 SERTÃO BICOS 🌵</header>
<div class="container">
    <div class="upload-box" id="box">
        <span id="txt">TOQUE PARA ENVIAR FOTO</span>
        <input type="file" id="arquivo" accept="image/*">
    </div>

    <div class="grid">
        <div class="btn-cat" id="c_carro" onclick="setCat('CARRO')">🚗 CARRO</div>
        <div class="btn-cat" id="c_ambos" onclick="setCat('AMBOS')">🚗🏍️ AMBOS</div>
    </div>

    <button id="btnBuscar" onclick="buscar()">PROCURAR BICO AGORA</button>
    <div id="status" style="margin: 15px; font-weight: bold; color: var(--verde);"></div>
    <div id="resultados"></div>
</div>

<script>
// SINCRONIA: O LINK DO SEU NGROK
const URL_SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev";
let categoria = '';

function setCat(c) {
    categoria = c;
    document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
    document.getElementById(c == 'CARRO' ? 'c_carro' : 'c_ambos').classList.add('active');
    if(document.getElementById('arquivo').files[0]) document.getElementById('btnBuscar').style.display = 'block';
}

document.getElementById('arquivo').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
        document.getElementById('box').style.backgroundImage = `url(${ev.target.result})`;
        document.getElementById('txt').style.display = 'none';
        if(categoria) document.getElementById('btnBuscar').style.display = 'block';
    };
    reader.readAsDataURL(e.target.files[0]);
};

async function buscar() {
    const file = document.getElementById('arquivo').files[0];
    document.getElementById('status').innerText = "⏳ IA BUSCANDO NO SERVIDOR...";
    
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        try {
            const res = await fetch(`${URL_SERVIDOR}/buscar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ image: reader.result, categoria: categoria })
            });
            const bicos = await res.json();
            exibir(bicos);
        } catch (e) {
            document.getElementById('status').innerText = "❌ ERRO DE CONEXÃO!";
        }
    };
}

function exibir(lista) {
    document.getElementById('status').innerText = lista.length > 0 ? "✅ SUCESSO!" : "❌ NADA ENCONTRADO";
    document.getElementById('resultados').innerHTML = lista.map(b => `
        <div class="card">
            <img src="${b.foto}">
            <div style="text-align:left">
                <b style="color:var(--verde)">${b.score}% Match</b><br>
                <small>ID: ${b.numId}</small>
                <a href="https://wa.me/5511930927753?text=Quero o bico ID:${b.numId}" class="btn-whats">PEGAR DADOS 🌵</a>
            </div>
        </div>
    `).join('');
}
</script>
</body>
</html>
