<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sertão Bicos - Biometria Facial</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* O SEU LAYOUT ORIGINAL DE VOLTA */
        :root {
            --fundo: #000000;
            --laranja: #ff8c00;
            --verde: #00ff00;
            --card: #111111;
        }

        body {
            background: var(--fundo);
            color: #fff;
            font-family: 'Impact', sans-serif;
            margin: 0;
            text-align: center;
        }

        header {
            background: #000;
            padding: 25px;
            font-size: 30px;
            border-bottom: 4px solid var(--laranja);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 20px;
        }

        /* BOX DE UPLOAD ORIGINAL COM OS CACTOS */
        .upload-box {
            background: var(--card);
            border: 3px dashed var(--laranja);
            height: 180px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
            background-size: cover;
            background-position: center;
        }
        
        .upload-box::before { content: "🌵"; font-size: 50px; }
        .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 5; }

        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn {
            background: #222;
            border: 2px solid var(--laranja);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .cat-btn.active {
            background: var(--laranja);
            color: #000;
            box-shadow: 0 0 10px var(--laranja);
        }

        /* BOTÃO DE BUSCA ORIGINAL */
        #btnBuscar {
            background: #27ae60;
            color: #fff;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
            display: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* CARDS DE RESULTADOS */
        .card {
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            border: 1px solid #333;
            margin-bottom: 10px;
            text-align: left;
        }

        .card img {
            width: 110px;
            height: 110px;
            border-radius: 12px;
            border: 2px solid var(--laranja);
            object-fit: cover;
        }

        .info { margin-left: 15px; flex-grow: 1; }
        .id-text { color: var(--verde); font-size: 26px; font-weight: 900; display: block; }
        
        /* BARRA DE SEMELHANÇA HARD */
        .perc-info { font-size: 12px; color: #888; margin-top: 5px; font-family: sans-serif; }
        .barra-fundo { background: #222; height: 8px; border-radius: 4px; overflow: hidden; margin: 4px 0; }
        .barra-cor { background: var(--verde); height: 100%; box-shadow: 0 0 8px var(--verde); }

        .btn-whats {
            background: #25d366;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            font-family: sans-serif;
        }

        #status { margin-top: 15px; font-weight: bold; color: var(--verde); }
    </style>
</head>
<body>

<header>🌵 SERTÃO BICOS 🌵</header>

<div class="container">
    <div class="upload-box" id="dropArea">
        <span id="txtUp" style="position:absolute; bottom:20px; font-size:12px; font-family:sans-serif;">ENVIAR FOTO DO CLIENTE</span>
        <input type="file" id="fotoIn" accept="image/*">
    </div>

    <div class="cat-grid">
        <div class="cat-btn" id="b-carro" onclick="setCat('CARRO')">🚗 CARRO</div>
        <div class="cat-btn" id="b-ambos" onclick="setCat('AMBOS')">🚗🏍️ AMBOS</div>
    </div>

    <button id="btnBuscar" onclick="buscarFacial()">BUSCAR POR BIOMETRIA 🔍</button>
    
    <div id="status"></div>
    <div id="resultados"></div>
</div>

<script>
    const SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev"; 
    const WHATS = "5511925243032";
    let catSel = "";

    function setCat(c) {
        catSel = c;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(c === 'CARRO' ? 'b-carro' : 'b-ambos').classList.add('active');
        if(document.getElementById('fotoIn').files[0]) document.getElementById('btnBuscar').style.display = 'block';
    }

    document.getElementById('fotoIn').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('dropArea').style.backgroundImage = `url(${ev.target.result})`;
                document.getElementById('txtUp').style.display = 'none';
            };
            reader.readAsDataURL(file);
            if(catSel) document.getElementById('btnBuscar').style.display = 'block';
        }
    };

    async function buscarFacial() {
        const f = document.getElementById('fotoIn').files[0];
        const st = document.getElementById('status');
        st.innerHTML = "🔍 ESCANEANDO ROSTO (LEVEL HARD)...";

        const fd = new FormData();
        fd.append('foto_cliente', f);
        fd.append('categoria', catSel);

        try {
            const res = await fetch(`${SERVIDOR}/buscar_para_limpar`, {
                method: 'POST',
                headers: { 'ngrok-skip-browser-warning': 'true' },
                body: fd
            });
            const dados = await res.json();
            exibirResultados(dados);
        } catch (err) {
            st.innerHTML = "❌ SERVIDOR OFFLINE";
        }
    }

    function exibirResultados(lista) {
        const div = document.getElementById('resultados');
        const st = document.getElementById('status');
        
        st.innerHTML = lista.length > 0 ? "✅ GÊMEO LOCALIZADO!" : "❌ NÃO ENCONTRADO";
        
        div.innerHTML = lista.map(res => `
            <div class="card">
                <img src="${SERVIDOR}/banco_de_bicos/${res.path}?v=${Date.now()}" onerror="this.src='https://placehold.jp/24/333/fff/110x110.png?text=FOTO+OFF'">
                <div class="info">
                    <span class="id-text">ID: ${res.numId}</span>
                    <div class="perc-info">Semelhança: ${res.precisao}%</div>
                    <div class="barra-fundo"><div class="barra-cor" style="width: ${res.precisao}%"></div></div>
                    <a href="https://wa.me/${WHATS}?text=ID:${res.numId}" target="_blank" class="btn-whats">PEGAR DADOS 🌵</a>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
