<script>
// --- CONFIGURAÇÃO ---
// AQUI ESTÁ A CORREÇÃO: Somente o link do Ngrok entre aspas!
const URL_SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev"; 
const WHATSAPP_NUMERO = "5511925243032";
let categoriaSelecionada = '';

// --- LÓGICA DO CLIENTE ---
function selecionarCat(cat) {
    categoriaSelecionada = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    const idBtn = cat === 'CARRO' ? 'btnCarro' : 'btnAmbos';
    if(document.getElementById(idBtn)) document.getElementById(idBtn).classList.add('active');
    if(document.getElementById('fotoCliente').files[0]) document.getElementById('btnBuscar').style.display = 'block';
}

document.getElementById('fotoCliente').onchange = (e) => {
    const file = e.target.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const dropArea = document.getElementById('dropArea');
            dropArea.style.backgroundImage = `url(${event.target.result})`;
            dropArea.style.setProperty('--display-icone', 'none'); 
            document.getElementById('labelUpload').style.display = 'none';
        };
        reader.readAsDataURL(file);
        if(categoriaSelecionada) document.getElementById('btnBuscar').style.display = 'block';
    }
};

async function enviarParaServidor() {
    const file = document.getElementById('fotoCliente').files[0];
    if(!file) return alert("Selecione uma foto!");

    document.getElementById('status').innerHTML = "🌵 <b>IA PROCESSANDO NO SERVIDOR...</b> 🌵";
    document.getElementById('resultados').innerHTML = "";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        try {
            // Chamada para a rota de busca por imagem (IA)
            const res = await fetch(`${URL_SERVIDOR}/buscar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    image: reader.result,
                    categoria: categoriaSelecionada
                })
            });

            const dados = await res.json();
            exibirResultados(dados);
        } catch (err) {
            document.getElementById('status').innerText = "Erro ao conectar com o servidor! Verifique se o Ngrok está aberto.";
        }
    };
}

function exibirResultados(lista) {
    const status = document.getElementById('status');
    const divResultados = document.getElementById('resultados');
    const aviso = document.getElementById('avisoMescla');

    status.innerHTML = lista.length > 0 ? "✅ <b>BUSCA CONCLUÍDA!</b>" : "❌ <b>NENHUM BICO ENCONTRADO</b>";
    aviso.style.display = lista.length > 0 ? "block" : "none";
    
    divResultados.innerHTML = lista.map(res => {
        const linkZap = `https://wa.me/${WHATSAPP_NUMERO}?text=Olá, quero os dados do bico ID:${res.numId}`;
        // IMPORTANTE: O servidor Python deve servir a imagem na rota /banco_de_bicos/
        const imgUrl = res.foto.startsWith('http') ? res.foto : `${URL_SERVIDOR}/banco_de_bicos/${res.foto}`;

        return `<div class="card">
            <img src="${imgUrl}" onclick="zoom('${imgUrl}')" onerror="this.src='https://via.placeholder.com/100?text=Erro+Foto'">
            <div style="text-align:left; flex-grow:1">
                <b style="color:var(--cor-detalhe);">${res.score}% Match</b><br>
                <div class="copy-id-btn" onclick="navigator.clipboard.writeText('${res.numId}'); alert('ID Copiado!');">ID: ${res.numId} 📋</div><br>
                <a href="${linkZap}" target="_blank" class="btn-whats">PEGAR DADOS 🌵</a>
            </div>
        </div>`;
    }).join('');
}

// --- LÓGICA ADMIN (CADASTRO RÁPIDO) ---
function abrirAdmin() { 
    if(prompt("Senha:") === "9122") document.getElementById('adminPanel').style.display = 'block'; 
}

async function cadastrarNoServidor() {
    const files = Array.from(document.getElementById('fotosPasta').files);
    const cat = document.getElementById('adminCat').value;
    const btn = document.getElementById('btnCadastrarLote');
    
    if (files.length === 0) return alert("Selecione fotos!");
    btn.innerText = "ENVIANDO AO PC...";
    btn.disabled = true;

    for (let file of files) {
        let idFinal = file.name.replace(/\D/g, '').substring(0,5); // Ajustado para 5 dígitos padrão
        const reader = new FileReader();
        
        await new Promise(resolve => {
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    await fetch(`${URL_SERVIDOR}/cadastrar_auto`, { // Usando a rota de cadastro automático que criamos
                        method: 'POST',
                        body: (function() {
                            const fd = new FormData();
                            fd.append('foto', file);
                            fd.append('nome_real', file.name);
                            fd.append('categoria', cat);
                            return fd;
                        })()
                    });
                } catch (e) { console.error("Erro no envio", e); }
                resolve();
            };
        });
        // Espera 500ms entre cadastros para proteger o HD
        await new Promise(r => setTimeout(r, 500));
    }
    
    btn.innerText = "CADASTRAR NO PC";
    btn.disabled = false;
    alert("Processo Finalizado!");
}

function zoom(src) { 
    document.getElementById('imgModal').src = src; 
    document.getElementById('modal').style.display = 'flex'; 
}
</script>
