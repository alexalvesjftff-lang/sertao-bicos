<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertão Bicos - Sistema de Identificação</title>
    <style>
        /* ESTILO ORIGINAL DO SERTÃO BICOS */
        :root { 
            --marrom-escuro: #283618; 
            --marrom-claro: #bc6c25; 
            --bege-fundo: #fefae0; 
            --bege-card: #faedcd;
            --verde-sertao: #606c38;
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bege-fundo); 
            color: var(--marrom-escuro); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--bege-card); 
            padding: 30px; 
            border-radius: 5px; 
            border: 4px solid var(--marrom-escuro); 
            box-shadow: 15px 15px 0px var(--marrom-claro); 
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitulo { font-size: 1rem; margin-bottom: 30px; border-bottom: 2px solid var(--marrom-escuro); padding-bottom: 10px; }

        .upload-box { 
            border: 3px dashed var(--marrom-escuro); 
            padding: 40px 20px; 
            margin-bottom: 20px; 
            cursor: pointer; 
            background: #fffef2;
            transition: 0.3s;
        }
        .upload-box:hover { background: #fdf2d5; }

        .btn-principal { 
            background: var(--marrom-escuro); 
            color: white; 
            border: none; 
            padding: 20px; 
            width: 100%; 
            font-size: 1.2rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
        }
        .btn-principal:hover { background: var(--verde-sertao); }

        #resultado { 
            margin-top: 25px; 
            padding: 20px; 
            border: 3px solid var(--marrom-escuro); 
            display: none; 
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* PAINEL ADMIN */
        .admin-trigger { position: fixed; top: 10px; left: 10px; font-size: 30px; cursor: pointer; opacity: 0.6; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border: 5px solid var(--marrom-escuro); z-index: 1000; width: 85%; max-width: 350px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        
        .cat-group { display: flex; justify-content: space-between; margin: 15px 0; }
        .cat-btn { background: #ddd; border: 2px solid var(--marrom-escuro); padding: 10px; width: 48%; cursor: pointer; font-weight: bold; }
        .cat-btn.active { background: var(--marrom-claro); color: white; }

        input[type="password"], input[type="file"] { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="admin-trigger" onclick="abrirAdmin()">🌵</div>

    <div class="container">
        <h1>Sertão Bicos</h1>
        <div class="subtitulo">Tecnologia de Cabra Macho</div>

        <div class="upload-box" onclick="document.getElementById('foto_cliente').click()">
            <strong id="status_upload">📷 TOQUE PARA SUBIR A FOTO</strong>
            <input type="file" id="foto_cliente" hidden onchange="atualizarTexto()">
        </div>

        <button class="btn-principal" onclick="procurarBico()">🔍 PROCURAR BICO AGORA</button>

        <div id="resultado"></div>
    </div>

    <div class="overlay" id="overlay" onclick="fecharAdmin()"></div>
    <div class="modal" id="modalAdmin">
        <h3>Painel do Capitão</h3>
        <input type="password" id="senha" placeholder="Senha Secreta">
        <div class="cat-group">
            <button class="cat-btn active" id="btnCarro" onclick="selecionarCat('CARRO')">CARRO</button>
            <button class="cat-btn" id="btnAmbos" onclick="selecionarCat('AMBOS')">AMBOS</button>
        </div>
        <input type="file" id="foto_cadastro">
        <button class="btn-principal" onclick="cadastrarBico()" style="background: var(--marrom-claro);">✅ SALVAR NO BANCO</button>
    </div>

    <script>
        // CONFIGURAÇÕES
        const URL_SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev";
        let categoriaGlobal = "CARRO";

        function atualizarTexto() {
            const file = document.getElementById('foto_cliente').files[0];
            if(file) document.getElementById('status_upload').innerText = "✅ " + file.name;
        }

        function abrirAdmin() {
            document.getElementById('modalAdmin').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function fecharAdmin() {
            document.getElementById('modalAdmin').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        // CORREÇÃO DA FUNÇÃO QUE ESTAVA DANDO ERRO
        function selecionarCat(cat) {
            categoriaGlobal = cat;
            document.getElementById('btnCarro').classList.remove('active');
            document.getElementById('btnAmbos').classList.remove('active');
            
            if(cat === 'CARRO') document.getElementById('btnCarro').classList.add('active');
            else document.getElementById('btnAmbos').classList.add('active');
        }

        async function procurarBico() {
            const foto = document.getElementById('foto_cliente').files[0];
            if(!foto) return alert("Suba a foto do cliente primeiro!");

            const resDiv = document.getElementById('resultado');
            resDiv.style.display = "block";
            resDiv.style.background = "#fff";
            resDiv.innerText = "⏳ O Sertão está procurando... Aguarde.";

            const formData = new FormData();
            formData.append('foto', foto);

            try {
                const response = await fetch(`${URL_SERVIDOR}/procurar`, { method: 'POST', body: formData });
                const data = await response.json();

                if(data.encontrado) {
                    resDiv.style.background = "var(--marrom-escuro)";
                    resDiv.style.color = "white";
                    resDiv.innerHTML = `✅ BICO ENCONTRADO!<br><span style="font-size: 1.5rem">${data.nome}</span><br>Precisão: ${data.distancia}%`;
                } else {
                    resDiv.style.background = "var(--marrom-claro)";
                    resDiv.style.color = "white";
                    resDiv.innerText = "❌ Esse bico não consta no nosso banco!";
                }
            } catch (err) {
                resDiv.innerText = "⚠️ ERRO: Seu PC está offline ou o Ngrok mudou.";
            }
        }

        async function cadastrarBico() {
            const senha = document.getElementById('senha').value;
            const foto = document.getElementById('foto_cadastro').files[0];

            if(senha !== "9122") return alert("Senha errada, parceiro!");
            if(!foto) return alert("Escolha a foto do bico!");

            const formData = new FormData();
            formData.append('foto', foto);
            formData.append('categoria', categoriaGlobal);

            try {
                const response = await fetch(`${URL_SERVIDOR}/cadastrar`, { method: 'POST', body: formData });
                const data = await response.json();
                alert(data.mensagem);
                fecharAdmin();
            } catch (err) {
                alert("Erro ao conectar com o seu PC.");
            }
        }
    </script>
</body>
</html>
