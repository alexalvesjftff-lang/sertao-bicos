<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sertão Bicos - DNA Pro Cactus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --cor-fundo: #080808; --cor-principal: #ff8c00; --cor-detalhe: #00ff00; --cor-texto: #ffffff; --cor-card: #111111; }
        body { background: var(--cor-fundo); color: var(--cor-texto); font-family: sans-serif; margin: 0; text-align: center; }
        header { background: #000; padding: 20px; font-size: 24px; border-bottom: 3px solid var(--cor-detalhe); font-weight: bold; }
        .container { max-width: 450px; margin: auto; padding: 20px; }
        .upload-box { background: var(--cor-card); border: 2px dashed var(--cor-principal); height: 180px; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; margin-bottom: 20px; }
        .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .cat-btn { background: #1a1a1a; border: 2px solid var(--cor-principal); padding: 15px; border-radius: 10px; color: white; cursor: pointer; flex: 1; }
        .cat-btn.active { background: var(--cor-principal); }
        #btnBuscar { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; font-size: 18px; display: none; margin-top: 20px; cursor: pointer; }
        .card { background: var(--cor-card); border-radius: 12px; padding: 15px; display: flex; align-items: center; margin-top: 10px; border: 1px solid #333; }
        .card img { width: 90px; height: 90px; border-radius: 8px; border: 2px solid var(--cor-principal); object-fit: cover; }
        .btn-whats { background: #25d366; color: white; padding: 8px; border-radius: 5px; text-decoration: none; display: block; margin-top: 10px; font-size: 13px; font-weight: bold; }
        #adminPanel { display: none; position: fixed; inset: 10px; background: white; color: black; padding: 20px; z-index: 999; border-radius: 15px; overflow-y: auto; }
    </style>
</head>
<body>

<div style="width:50px;height:50px;position:fixed;top:0;left:0;" onclick="abrirAdmin()"></div>
<header>🌵 SERTÃO BICOS 🌵</header>

<div class="container">
    <div class="upload-box" id="dropArea">
        <span id="labelUpload">TOQUE PARA ENVIAR FOTO</span>
        <input type="file" id="fotoCliente" accept="image/*">
    </div>

    <div style="display:flex; gap:10px;">
        <div class="cat-btn" id="btnCarro" onclick="setCat('CARRO')">🚗 CARRO</div>
        <div class="cat-btn" id="btnAmbos" onclick="setCat('AMBOS')">🚗🏍️ AMBOS</div>
    </div>

    <button id="btnBuscar" onclick="enviarParaServidor()">PROCURAR MEU BICO</button>
    <div id="status" style="margin-top:15px; color:#00ff00;"></div>
    <div id="resultados"></div>
</div>

<div id="adminPanel">
    <h3>ADM SERTÃO</h3>
    <select id="adminCat" style="width:100%; padding:10px;"><option value="CARRO">CARRO</option><option value="AMBOS">AMBOS</option></select>
    <input type="file" id="fotosPasta" multiple style="margin:20px 0;">
    <button onclick="cadastrarNoServidor()" style="width:100%; padding:15px; background:green; color:white;">CADASTRAR NO PC</button>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="margin-top:20px;">SAIR</button>
</div>

<script>
// --- AJUSTE O LINK DO NGROK AQUI ---
const URL_SERVIDOR = "https://undelegated-notarial-lessie.ngrok-free.dev"; 
const WHATSAPP = "5511925243032";
let categoria = '';

function setCat(c) {
    categoria = c;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(c === 'CARRO' ? 'btnCarro' : 'btnAmbos').classList.add('active');
    if(document.getElementById('fotoCliente').files[0]) document.getElementById('btnBuscar').style.display = 'block';
}

document.getElementById('fotoCliente').onchange = (e) => {
    if(e.target.files[0]) {
        document.getElementById('labelUpload').innerText = "FOTO CARREGADA!";
        if(categoria) document.getElementById('btnBuscar').style.display = 'block';
    }
};

async function enviarParaServidor() {
    const file = document.getElementById('fotoCliente').files[0];
    document.getElementById('status').innerText = "🌵 PROCESSANDO MATCH...";
    
    // Busca enviando o nome do arquivo (que deve conter o CPF)
    const res = await fetch(`${URL_SERVIDOR}/buscar_para_limpar`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ cpfs: [file.name] }) 
    });
    const dados = await res.json();
    exibirResultados(dados);
}

function exibirResultados(lista) {
    const div = document.getElementById('resultados');
    document.getElementById('status').innerText = lista.length > 0 ? "✅ BICO LOCALIZADO!" : "❌ NÃO ENCONTRADO";
    
    div.innerHTML = lista.map(res => {
        // LINK DA FOTO: Servidor + Rota das Fotos + Pasta/Arquivo
        const imgUrl = `${URL_SERVIDOR}/banco_de_bicos/${res.path}`;
        return `
        <div class="card">
            <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/90?text=Erro+Foto'">
            <div style="text-align:left; padding-left:15px; flex-grow:1;">
                <b style="color:#00ff00; font-size:18px;">ID: ${res.numId}</b><br>
                <a href="https://wa.me/${WHATSAPP}?text=ID:${res.numId}" target="_blank" class="btn-whats">PEGAR DADOS 🌵</a>
            </div>
        </div>`;
    }).join('');
}

function abrirAdmin() { if(prompt("Senha:") === "9122") document.getElementById('adminPanel').style.display = 'block'; }

async function cadastrarNoServidor() {
    const files = Array.from(document.getElementById('fotosPasta').files);
    const cat = document.getElementById('adminCat').value;
    for (let file of files) {
        const fd = new FormData();
        fd.append('foto', file);
        fd.append('nome_real', file.name);
        fd.append('categoria', cat);
        await fetch(`${URL_SERVIDOR}/cadastrar_auto`, { method: 'POST', body: fd });
        await new Promise(r => setTimeout(r, 800)); // Protege HD
    }
    alert("Cadastrado!");
}
</script>
</body>
</html>
